<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="gold-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#D4AF37" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0A0A0A" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Gold Border -->
  <rect x="24" y="24" width="464" height="464" rx="90" fill="none" stroke="url(#gold-grad)" stroke-width="8"/>
  <!-- Chart Candlesticks or Trend Line -->
  <!-- Stock trendline with gold gradient -->
  <path d="M120 380 L200 300 L280 340 L380 200" fill="none" stroke="url(#gold-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow Head -->
  <path d="M310 200 L380 200 L380 270" fill="none" stroke="url(#gold-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Decorative grid lines in dark/subtle gold -->
  <line x1="80" y1="420" x2="440" y2="420" stroke="#262626" stroke-width="4" stroke-dasharray="8 8" />
  <line x1="80" y1="320" x2="440" y2="320" stroke="#262626" stroke-width="4" stroke-dasharray="8 8" />
  <line x1="80" y1="220" x2="440" y2="220" stroke="#262626" stroke-width="4" stroke-dasharray="8 8" />
  <!-- Circle nodes -->
  <circle cx="120" cy="380" r="16" fill="#0A0A0A" stroke="url(#gold-grad)" stroke-width="8"/>
  <circle cx="200" cy="300" r="16" fill="#0A0A0A" stroke="url(#gold-grad)" stroke-width="8"/>
  <circle cx="280" cy="340" r="16" fill="#0A0A0A" stroke="url(#gold-grad)" stroke-width="8"/>
  <circle cx="380" cy="200" r="18" fill="url(#gold-grad)"/>
</svg>
